services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      CONTINUUM_API_PORT: 3030
      CONTINUUM_STORE: postgres
      CONTINUUM_DATABASE_URL: postgres://continuum:${CONTINUUM_POSTGRES_PASSWORD:-continuum}@postgres:5432/continuum
      CONTINUUM_LLM_DEFAULT_PROVIDER: mock
    ports:
      - "3030:3030"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "const r=await fetch('http://127.0.0.1:3030/readyz'); process.exit(r.ok?0:1)"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      CONTINUUM_API_BASE_URL: http://api:3030
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: continuum
      POSTGRES_PASSWORD: ${CONTINUUM_POSTGRES_PASSWORD:-continuum}
      POSTGRES_DB: continuum
    volumes:
      - continuum-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continuum -d continuum"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  continuum-postgres:
