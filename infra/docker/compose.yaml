services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: continuum-postgres
    environment:
      POSTGRES_USER: continuum
      POSTGRES_PASSWORD: continuum
      POSTGRES_DB: continuum
    ports:
      - "5432:5432"
    volumes:
      - ../../.continuum-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continuum -d continuum"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: continuum-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ../../.continuum-data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "timeout 2 bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8
    container_name: continuum-valkey
    ports:
      - "6379:6379"
    volumes:
      - ../../.continuum-data/valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: continuum-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: continuum
      MINIO_ROOT_PASSWORD: continuum-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../../.continuum-data/minio:/data
