name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v5

  secrets-and-files:
    name: Secret and repository hygiene checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for obvious committed runtime data
        run: |
          test ! -d .continuum-data
          test ! -d node_modules
          test ! -f .env
      - name: Check docs mention backups
        run: grep -R "backup" docs/runbooks docs/release SECURITY.md
